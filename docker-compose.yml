services:
  backend:
    build: ./backend
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ./Analysis:/app/Analysis
      - ./CCTV:/data
      - ./models:/app/models
      - ./backend:/app          # dev: live code reload
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
